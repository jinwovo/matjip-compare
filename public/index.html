<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#1a1816" />
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🍚</text></svg>" />
    <title>맛집비교 지도</title>
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="맛집비교" />
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css" />
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <div id="app">
      <header id="topbar">
        <div class="brand">🍚 맛집비교</div>
        <button type="button" id="locBtn" title="내 위치로 이동">📍</button>
        <form id="searchForm">
          <input id="searchInput" type="search" placeholder="예: 강남역 초밥  ·  ✨로 '비 오는 날 국물집'" autocomplete="off" />
          <button type="button" id="nlBtn" title="자연어로 찾기 (예: 혼밥하기 좋은 조용한 곳)">✨</button>
          <button type="submit" id="searchBtn">검색</button>
        </form>
      </header>

      <main id="main">
        <div id="map">
          <button id="hereBtn" class="here-btn" type="button">이 지역 맛집 찾기</button>
        </div>

        <aside id="panel" class="empty">
          <div id="panelHint" class="hint">
            <p>검색해서 지도에 뜬 가게를 눌러보세요.</p>
            <p class="sub">네이버·카카오·구글의 별점과 리뷰수를 한 번에 비교합니다.</p>
          </div>

          <section id="listSection" hidden>
            <div id="nlNote" class="nl-note" hidden></div>
            <button id="briefBtn" class="brief-btn" type="button" hidden>✨ 이 지역 AI 브리핑</button>
            <div id="briefCard" class="brief-card" hidden></div>
            <div class="list-head">
              <h2 class="section-title">검색 결과 <span id="resultCount"></span></h2>
              <div id="sortBar">
                <button type="button" class="chip chip-now" data-sort="now">지금</button>
                <button type="button" class="chip active" data-sort="recommend">추천순</button>
                <button type="button" class="chip" data-sort="rating">평점순</button>
                <button type="button" class="chip" data-sort="reviews">리뷰순</button>
                <button type="button" class="chip" data-sort="near">가까운순</button>
                <button type="button" id="favToggle" class="chip fav-toggle">☆ 즐겨찾기</button>
              </div>
              <div id="filterBar">
                <span class="fbar-label">필터</span>
                <button type="button" class="fchip" data-min-rating="4">4.0★+</button>
                <button type="button" class="fchip" data-min-rating="4.5">4.5★+</button>
                <button type="button" class="fchip" data-min-reviews="100">리뷰 100+</button>
                <button type="button" class="fchip" data-min-reviews="500">리뷰 500+</button>
              </div>
            </div>
            <div id="catBar"></div>
            <ul id="list"></ul>
          </section>

          <section id="detail" hidden>
            <button id="backBtn" class="back">‹ 목록</button>
            <div class="detail-head">
              <h2 id="detailName"></h2>
              <button id="favDetailBtn" class="fav-btn lg" title="즐겨찾기">☆</button>
            </div>
            <p id="detailMeta" class="meta"></p>
            <div id="detailAgg"></div>
            <div id="detailExtras"></div>
            <div id="compare"></div>
            <p id="matchNote" class="match-note"></p>
          </section>
        </aside>
      </main>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
    <script src="/app.js"></script>
  </body>
</html>
